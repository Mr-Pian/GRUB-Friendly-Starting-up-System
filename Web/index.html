<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="/apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mambo 开机助手</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mesh中枢">
    <style>
        :root {
            --bg-dark: #0f0f11;
            --card-bg: #1a1a1e;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-cyan: #17a2b8;
            --accent-blue: #0078d7;
            --success: #2ea043;
            --danger: #da3633;
            --disabled: #2d2d30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            background-color: var(--card-bg);
            width: 88%;
            max-width: 400px;
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        /* --- 登录区 --- */
        #login-screen { display: block; }
        .title { font-size: 24px; font-weight: 600; margin-bottom: 20px; letter-spacing: 1px;}
        input[type="password"] {
            width: 70%;
            padding: 16px;
            margin: 10px 0 25px 0;
            border-radius: 14px;
            border: 1px solid #333;
            background: #252529;
            color: white;
            text-align: center;
            font-size: 20px;
            letter-spacing: 5px;
            outline: none;
            transition: border 0.3s;
        }
        input[type="password"]:focus { border-color: var(--accent-cyan); }

        /* --- 控制面板区 --- */
        #main-ui { display: none; }

        .header-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; }

        /* --- 扁平化水平状态栏指示牌区 --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            padding: 0 5px;
        }
        .status-badge {
            flex: 1;
            max-width: 32%;
            padding: 8px 6px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            background-color: var(--disabled);
            color: var(--text-muted);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .status-badge.on { background-color: rgba(46, 160, 67, 0.1); color: var(--success); }


        /* 选项卡切换器 */
        .toggle-group {
            display: flex;
            background: #252529;
            border-radius: 14px;
            margin-bottom: 15px;
            padding: 4px;
        }
        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .toggle-btn.active { background: #3d3d42; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .toggle-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 中心大开机键 */
        .btn-boot {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--success);
            background: transparent;
            color: var(--success);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.3s, border-color 0.3s;
            touch-action: manipulation;
        }
        .btn-boot:active:not(:disabled) { transform: scale(0.93); background: rgba(46, 160, 67, 0.1); }
        .btn-boot:disabled {
            border-color: var(--disabled);
            color: var(--text-muted);
            cursor: not-allowed;
            background: #1f1f22;
        }

        /* 危险区按钮 */
        .danger-zone { display: flex; gap: 15px; margin-top: 30px; }
        .btn-action {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background-color: #333;
            transition: opacity 0.3s;
        }
        .btn-action:active:not(:disabled) { opacity: 0.8; }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-enter { background-color: var(--accent-cyan); width: 80%; }
        .btn-reset { background-color: #d27519; }
        .btn-force-off { background-color: var(--disabled); }

        /* 长按进度条样式 */
        .btn-force-off .progress {
            position: absolute;
            bottom: 0; left: 0; height: 100%;
            background-color: var(--danger);
            width: 0%;
            z-index: 1;
            transition: width 0.05s linear;
        }
        .btn-force-off span { position: relative; z-index: 2; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="title">身份验证</div>
        <input type="password" id="pass-input" placeholder="输入控制密码" inputmode="numeric">
        <br>
        <button class="btn-action btn-enter" id="btn-login" onclick="login()">进入系统</button>
    </div>

    <div id="main-ui">
        <div class="header-title" id="pc-name">设备名称</div>

        <div class="status-bar">
            <div class="status-badge" id="badge-mesh">📡 节点离线</div>
            <div class="status-badge" id="badge-batt">🔋 --.-V</div>
            <div class="status-badge" id="badge-pc">🖥 PC未知</div>
        </div>

        <div class="toggle-group" id="os-selector">
            <button class="toggle-btn active" id="btn-os-arch" style="color:var(--accent-cyan);" onclick="setOS('arch')">Arch</button>
            <button class="toggle-btn" id="btn-os-win" style="color:var(--accent-blue);" onclick="setOS('win')">Windows</button>
        </div>

        <button class="btn-boot" id="btn-boot" onclick="sendCmd('boot')">开 机</button>

        <div class="danger-zone">
            <button class="btn-action btn-reset" id="btn-reset" onclick="sendCmd('reset')">重 置</button>
            <button class="btn-action btn-force-off" id="btn-force"
                    onmousedown="startHold()" onmouseup="stopHold()" onmouseleave="stopHold()"
                    ontouchstart="startHold(event)" ontouchend="stopHold(event)">
                <div class="progress" id="force-progress"></div>
                <span>长按3秒强断</span>
            </button>
        </div>
    </div>
</div>

<script>
    // ================= 全局状态 =================
    let state = {
        token: '',       // 存储后端发来的通行证
        role: '',        // 'mambo' 或 'kang'
        os: 'arch',       // 默认系统
        meshOnline: false,
        meshBatt: 0.0,
        pcIsOn: false
    };

    let pollingTimer = null; // 状态轮询定时器

    // ================= 1. 真实网络登录逻辑 =================
    async function login() {
        const pass = document.getElementById('pass-input').value;
        const btnLogin = document.querySelector('.btn-enter');

        if (!pass) return alert('请输入密码！');

        btnLogin.innerText = '验证中...';
        btnLogin.disabled = true;

        try {
            // 向 Node.js 后端发送真实的登录请求
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin: pass })
            });

            const result = await response.json();

            if (result.success) {
                state.token = result.token;
                state.role = result.role;

                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('pc-name').innerText = result.msg;

                const osSelector = document.getElementById('os-selector');
                if(state.role === 'kang') {
                    osSelector.style.display = 'none';
                }

                // 登录成功后，立刻拉取一次真实状态，并开启每 3 秒一次的自动轮询
                fetchStatus();
                pollingTimer = setInterval(fetchStatus, 3000);

            } else {
                alert(result.msg || '密码错误！');
            }
        } catch (error) {
            alert('网络连接失败，请检查后端服务是否正常运行。');
        } finally {
            btnLogin.innerText = '进入系统';
            btnLogin.disabled = false;
        }
    }

    // ================= 2. 系统切换逻辑 =================
    function setOS(os) {
        if(state.pcIsOn) return;

        state.os = os;
        document.getElementById('btn-os-arch').classList.toggle('active', os === 'arch');
        document.getElementById('btn-os-win').classList.toggle('active', os === 'win');
    }

    // ================= 3. UI 状态刷新 (核心逻辑) =================
    function updateUI() {
        const badgeMesh = document.getElementById('badge-mesh');
        const badgeBatt = document.getElementById('badge-batt');
        const badgePc = document.getElementById('badge-pc');

        const btnBoot = document.getElementById('btn-boot');
        const btnReset = document.getElementById('btn-reset');
        const btnForce = document.getElementById('btn-force');

        const btnOsArch = document.getElementById('btn-os-arch');
        const btnOsWin = document.getElementById('btn-os-win');

        if(state.meshOnline) {
            badgeMesh.innerText = '📡 在线';
            badgeMesh.classList.add('on');

            badgeBatt.innerText = `🔋 ${state.meshBatt.toFixed(2)}V`;
            if(state.meshBatt > 2.8) badgeBatt.classList.add('on');
            else badgeBatt.classList.remove('on');

            if(state.pcIsOn) {
                badgePc.innerText = '🖥 运行中';
                badgePc.classList.add('on');

                btnBoot.disabled = true;  btnBoot.innerText = '已运行';
                btnReset.disabled = false; btnForce.disabled = false;

                btnOsArch.disabled = true;
                btnOsWin.disabled = true;
            } else {
                badgePc.innerText = '🖥 已关机';
                badgePc.classList.remove('on');

                btnBoot.disabled = false; btnBoot.innerText = '开 机';
                btnReset.disabled = true;  btnForce.disabled = true;

                btnOsArch.disabled = false;
                btnOsWin.disabled = false;
            }
        } else {
            // 节点离线，全局锁死
            badgeMesh.innerText = '📡 离线';   badgeMesh.classList.remove('on');
            badgeBatt.innerText = '🔋 --.-V';  badgeBatt.classList.remove('on');
            badgePc.innerText = '🖥 未知';     badgePc.classList.remove('on');

            btnBoot.disabled = true;  btnBoot.innerText = '脱 机';
            btnReset.disabled = true;
            btnForce.disabled = true;

            btnOsArch.disabled = true;
            btnOsWin.disabled = true;
        }
    }

    // ================= 4. 发送真实的控制指令 =================
    async function sendCmd(cmd) {
        if(!state.meshOnline) return;

        // 【按照你的要求：删除所有前端的“唤醒中/执行中”假动画】
        // 直接向 Node.js 服务器静默下发指令
        try {
            await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: state.token,
                    target: state.role,
                    action: cmd,
                    os: state.os
                })
            });
            // 重点：发完指令什么都不干！
            // 安静等待每 3 秒一次的 fetchStatus() 把 ESP32 的真实物理开机状态拉回来！
        } catch(e) {
            console.error('发送指令失败:', e);
            alert('网络异常，指令下发失败！');
        }
    }

    // ================= 5. 长按 3 秒防误触逻辑 =================
    let holdTimer;
    let holdProgress = 0;
    const holdDuration = 3000;
    const intervalTime = 50;

    function startHold(e) {
        if(e) e.preventDefault();
        if(!state.pcIsOn) return;

        const progressBar = document.getElementById('force-progress');
        holdProgress = 0;

        holdTimer = setInterval(() => {
            holdProgress += intervalTime;
            let percent = (holdProgress / holdDuration) * 100;
            progressBar.style.width = percent + '%';

            if(holdProgress >= holdDuration) {
                clearInterval(holdTimer);
                progressBar.style.width = '0%';
                sendCmd('force_off');
            }
        }, intervalTime);
    }

    function stopHold(e) {
        if(e) e.preventDefault();
        clearInterval(holdTimer);
        holdProgress = 0;
        document.getElementById('force-progress').style.width = '0%';
    }

    // ================= 6. 真实向服务器拉取状态 =================
    async function fetchStatus() {
        if(!state.token) return; // 没登录不拉取

        try {
            // 向 Node.js 拉取自己所属节点的真实状态
            const response = await fetch(`/api/status?token=${state.token}&target=${state.role}`);
            const data = await response.json();

            if(data.success) {
                // 将后端发来的真实数据覆盖到前端状态机
                state.meshOnline = data.meshOnline;
                state.meshBatt = data.meshBatt;
                state.pcIsOn = data.pcIsOn;
            } else {
                state.meshOnline = false;
            }
        } catch(e) {
            state.meshOnline = false;
        }

        updateUI();
    }
</script>

</body>
</html>
