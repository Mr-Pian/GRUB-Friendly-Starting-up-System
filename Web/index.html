<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesh 远程电源中枢</title>
    <style>
        :root {
            --bg-dark: #0f0f11;
            --card-bg: #1a1a1e;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-cyan: #17a2b8;
            --accent-blue: #0078d7;
            --success: #2ea043;
            --danger: #da3633;
            --disabled: #2d2d30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            background-color: var(--card-bg);
            width: 88%;
            max-width: 400px;
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        /* --- 登录区 --- */
        #login-screen { display: block; }
        .title { font-size: 24px; font-weight: 600; margin-bottom: 20px; letter-spacing: 1px;}
        input[type="password"] {
            width: 70%;
            padding: 16px;
            margin: 10px 0 25px 0;
            border-radius: 14px;
            border: 1px solid #333;
            background: #252529;
            color: white;
            text-align: center;
            font-size: 20px;
            letter-spacing: 5px;
            outline: none;
            transition: border 0.3s;
        }
        input[type="password"]:focus { border-color: var(--accent-cyan); }

        /* --- 控制面板区 --- */
        #main-ui { display: none; }

        .header-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; } /* 增加下方间距 */

        /* --- 【核心修复】：扁平化水平状态栏指示牌区 --- */
        .status-bar {
            display: flex;
            justify-content: space-between; /* 极致等宽分配 */
            align-items: center;
            gap: 8px; /* 短框之间的间距 */
            margin-bottom: 30px; /* 状态栏下方的间距 */
            padding: 0 5px; /* 两侧留白 */
        }
        .status-badge {
            flex: 1; /* 每个徽章占据等长的空间 */
            max-width: 32%; /* 极致防抖保护 */
            padding: 8px 6px; /* 紧凑 padding */
            border-radius: 12px; /* 扁平化圆角 */
            font-size: 11px; /* 字体缩小以适应紧凑空间 */
            font-weight: 500;
            background-color: var(--disabled);
            color: var(--text-muted);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center; /* 内容水平居中 */
            align-items: center; /* 内容垂直居中 */
            gap: 3px; /* 图标与文字的极小间距 */
            white-space: nowrap; /* 极致防抖：禁止换行 */
            overflow: hidden; /* 极致防抖：隐藏溢出 */
            text-overflow: ellipsis; /* 极致防抖：溢出显示省略号 */
        }
        /* 在线状态：绿色文字 + 透明背景色 */
        .status-badge.on { background-color: rgba(46, 160, 67, 0.1); color: var(--success); }


        /* 选项卡切换器 */
        .toggle-group {
            display: flex;
            background: #252529;
            border-radius: 14px;
            margin-bottom: 15px;
            padding: 4px;
        }
        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .toggle-btn.active { background: #3d3d42; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        /* 中心大开机键 */
        .btn-boot {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--success);
            background: transparent;
            color: var(--success);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.3s, border-color 0.3s;
            touch-action: manipulation;
        }
        .btn-boot:active:not(:disabled) { transform: scale(0.93); background: rgba(46, 160, 67, 0.1); }
        .btn-boot:disabled {
            border-color: var(--disabled);
            color: var(--text-muted);
            cursor: not-allowed;
            background: #1f1f22;
        }

        /* 危险区按钮 */
        .danger-zone { display: flex; gap: 15px; margin-top: 30px; }
        .btn-action {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background-color: #333;
            transition: opacity 0.3s;
        }
        .btn-action:active:not(:disabled) { opacity: 0.8; }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-enter { background-color: var(--accent-cyan); width: 80%; }
        .btn-reset { background-color: #d27519; }
        .btn-force-off { background-color: var(--disabled); }

        /* 长按进度条样式 */
        .btn-force-off .progress {
            position: absolute;
            bottom: 0; left: 0; height: 100%;
            background-color: var(--danger);
            width: 0%;
            z-index: 1;
            transition: width 0.05s linear; /* 提高进度条平滑度 */
        }
        .btn-force-off span { position: relative; z-index: 2; pointer-events: none; }
        .toggle-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="title">身份验证</div>
        <input type="password" id="pass-input" placeholder="输入控制密码" inputmode="numeric" maxlength="6">
        <br>
        <button class="btn-action btn-enter" onclick="login()">进入系统</button>
    </div>

    <div id="main-ui">
        <div class="header-title" id="pc-name">设备名称</div>

        <div class="status-bar">
            <div class="status-badge" id="badge-mesh">📡 节点离线</div>
            <div class="status-badge" id="badge-batt">🔋 --.-V</div>
            <div class="status-badge" id="badge-pc">🖥️ PC未知</div>
        </div>

        <div class="toggle-group" id="os-selector">
            <button class="toggle-btn" id="btn-os-arch" style="color:var(--accent-cyan);" onclick="setOS('arch')">Arch</button>
            <button class="toggle-btn active" id="btn-os-win" style="color:var(--accent-blue);" onclick="setOS('win')">Windows</button>
        </div>

        <button class="btn-boot" id="btn-boot" onclick="sendCmd('boot')">开 机</button>

        <div class="danger-zone">
            <button class="btn-action btn-reset" id="btn-reset" onclick="sendCmd('reset')">重 置</button>
            <button class="btn-action btn-force-off" id="btn-force"
                    onmousedown="startHold()" onmouseup="stopHold()" onmouseleave="stopHold()"
                    ontouchstart="startHold(event)" ontouchend="stopHold(event)">
                <div class="progress" id="force-progress"></div>
                <span>长按3秒强断</span>
            </button>
        </div>
    </div>
</div>

<script>
    // ================= 全局状态 =================
    let state = {
        role: '',        // 'mambo' 或 'kang'
        os: 'win',       // 默认系统
        meshOnline: false, // Mesh 节点是否在线
        meshBatt: 0.0,     // Mesh 节点电压
        pcIsOn: false      // PC 物理电源状态
    };

    // 假设这里的密码逻辑后续会移交到 Node.js 后端
    const USERS = {
        '111111': { role: 'mambo', name: "Mambo 的主机" },
        '888888': { role: 'kang',  name: "Kang 的主机" }
    };

    // ================= 1. 登录与权限渲染 =================
    function login() {
        const pass = document.getElementById('pass-input').value;
        const user = USERS[pass];

        if(user) {
            state.role = user.role;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('pc-name').innerText = user.name;

            // 【权限隔离】：如果是 kang，直接把 GRUB 系统选择器隐藏掉 (极致简洁)
            const osSelector = document.getElementById('os-selector');
            if(state.role === 'kang') {
                osSelector.style.display = 'none';
            }

            fetchStatus(); // 拉取设备状态
        } else {
            alert('密码错误！(测试密码: 111111 或 888888)');
        }
    }

    // ================= 2. 系统切换逻辑 =================
    function setOS(os) {
        if(state.pcIsOn) return;

        state.os = os;
        document.getElementById('btn-os-arch').classList.toggle('active', os === 'arch');
        document.getElementById('btn-os-win').classList.toggle('active', os === 'win');
    }

    // ================= 3. UI 状态刷新 (核心逻辑) =================
    function updateUI() {
        const badgeMesh = document.getElementById('badge-mesh');
        const badgeBatt = document.getElementById('badge-batt');
        const badgePc = document.getElementById('badge-pc');

        const btnBoot = document.getElementById('btn-boot');
        const btnReset = document.getElementById('btn-reset');
        const btnForce = document.getElementById('btn-force');

        // 【新增】：获取操作系统按钮
        const btnOsArch = document.getElementById('btn-os-arch');
        const btnOsWin = document.getElementById('btn-os-win');

        if(state.meshOnline) {
            badgeMesh.innerText = '📡 在线';
            badgeMesh.classList.add('on');

            badgeBatt.innerText = `🔋 ${state.meshBatt.toFixed(2)}V`;
            if(state.meshBatt > 2.8) badgeBatt.classList.add('on');
            else badgeBatt.classList.remove('on');

            if(state.pcIsOn) {
                badgePc.innerText = '🖥️ 运行中';
                badgePc.classList.add('on');

                btnBoot.disabled = true;  btnBoot.innerText = '已运行';
                btnReset.disabled = false; btnForce.disabled = false;

                // 【新增】：电脑开机后，彻底禁用系统切换按钮
                btnOsArch.disabled = true;
                btnOsWin.disabled = true;
            } else {
                badgePc.innerText = '🖥️ 已关机';
                badgePc.classList.remove('on');

                btnBoot.disabled = false; btnBoot.innerText = '开 机';
                btnReset.disabled = true;  btnForce.disabled = true;

                // 【新增】：电脑关机时，解锁系统切换
                btnOsArch.disabled = false;
                btnOsWin.disabled = false;
            }
        } else {
            badgeMesh.innerText = '📡 离线';   badgeMesh.classList.remove('on');
            badgeBatt.innerText = '🔋 --.-V';  badgeBatt.classList.remove('on');
            badgePc.innerText = '🖥️ 未知';     badgePc.classList.remove('on');

            btnBoot.disabled = true;  btnBoot.innerText = '脱 机';
            btnReset.disabled = true;
            btnForce.disabled = true;

            // 【新增】：如果连 Mesh 节点都断线了，同样锁死系统切换
            btnOsArch.disabled = true;
            btnOsWin.disabled = true;
        }
    }

    // ================= 4. 发送网络指令 =================
    function sendCmd(cmd) {
        if(!state.meshOnline) return; // 二重防护
        console.log(`执行下发 -> 目标: ${state.role}, 动作: ${cmd}, 系统: ${state.os}`);

        if(cmd === 'boot') {
            document.getElementById('badge-pc').innerText = '⏳ 唤醒中...';
            // 模拟 2 秒后节点听到了开机成功的广播
            setTimeout(() => { state.pcIsOn = true; updateUI(); }, 2000);
        } else if (cmd === 'force_off' || cmd === 'reset') {
            document.getElementById('badge-pc').innerText = '⏳ 执行中...';
            setTimeout(() => { state.pcIsOn = false; updateUI(); }, 2000);
        }
    }

    // ================= 5. 长按 3 秒防误触逻辑 =================
    let holdTimer;
    let holdProgress = 0;
    const holdDuration = 3000;
    const intervalTime = 50;

    function startHold(e) {
        if(e) e.preventDefault();

        // 【核心修复】：原先是 state.isOn，现在必须用 state.pcIsOn 才能正确判断！
        if(!state.pcIsOn) return;

        const progressBar = document.getElementById('force-progress');
        holdProgress = 0;

        holdTimer = setInterval(() => {
            holdProgress += intervalTime;
            let percent = (holdProgress / holdDuration) * 100;
            progressBar.style.width = percent + '%';

            if(holdProgress >= holdDuration) {
                clearInterval(holdTimer);
                progressBar.style.width = '0%';
                sendCmd('force_off');
            }
        }, intervalTime);
    }

    function stopHold(e) {
        if(e) e.preventDefault();
        clearInterval(holdTimer);
        holdProgress = 0;
        document.getElementById('force-progress').style.width = '0%';
    }

    // ================= 6. 模拟向服务器拉取状态 =================
    function fetchStatus() {
        // 演示：登录进来假设节点在线，电压 3.15V，电脑关机
        state.meshOnline = true;
        state.meshBatt = 3.15;
        state.pcIsOn = false;

        // 你可以把 state.meshOnline 改成 false 测一下“全盘锁死”的脱机状态
        updateUI();
    }
</script>

</body>
</html>
